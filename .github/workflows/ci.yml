name: Build PowerMateTray (Release)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Build wxWidgets using the repo script
      - name: Build wxWidgets
        run: cmd /c build_wx.bat

      - name: Build PowerMateTray (Release x64)
        run: msbuild PowerMateTray.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerMateTray-Release
          path: |
            **/Release/*.exe
            **/Release/*.dll
